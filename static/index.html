<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ElevenLabs Proxy · TTS Demo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root { --bg:#161618; --card:#1f1f23; --border:#2a2a30; --mute:#6b7280; }
  body { background:var(--bg); color:#e5e7eb; }
  .card { background:var(--card); border-color:var(--border); }
  .form-control, .form-select {
    background:#101013; border-color:var(--border); color:#e5e7eb;
  }
  .form-control:focus, .form-select:focus {
    background:#101013; color:#e5e7eb;
    border-color:#3b82f6; box-shadow:0 0 0 .15rem rgba(59,130,246,.25);
  }
  .text-mute2 { color:var(--mute) !important; }
  .badge-egress.ok { background:#16a34a33; color:#22c55e; border:1px solid #16a34a55; }
  .badge-egress.bad{ background:#dc262633; color:#f87171; border:1px solid #dc262655; }
  .badge-egress.wait{background:#3b82f633; color:#93c5fd; border:1px solid #3b82f655; }

  .log {
    font-family: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
    font-size:12.5px; line-height:1.55;
    background:#0c0c0e; border:1px solid var(--border); border-radius:.5rem;
    padding:.75rem 1rem; height:340px; overflow:auto; white-space:pre-wrap; word-break:break-all;
  }
  .log .ts   { color:#6b7280; }
  .log .info { color:#cbd5e1; }
  .log .ok   { color:#34d399; }
  .log .warn { color:#fbbf24; }
  .log .err  { color:#f87171; }

  audio { filter: invert(.92) hue-rotate(180deg); border-radius:.5rem; }
</style>
</head>
<body>
<div class="container py-4" style="max-width: 960px;">
  <header class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h4 m-0">ElevenLabs Proxy <span class="text-mute2 fw-normal">· TTS MVP</span></h1>
      <div class="small text-mute2 mt-1" id="account">…</div>
    </div>
    <span class="badge badge-egress wait" id="egress">checking egress…</span>
  </header>

  <div class="card mb-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label small text-mute2">文本</label>
        <textarea id="text" class="form-control" rows="3"
          placeholder="今天是2026年4月25日 欢迎来到我们的频道">今天是2026年4月25日 欢迎来到我们的频道</textarea>
      </div>
      <div class="row g-2">
        <div class="col-md-5">
          <label class="form-label small text-mute2">voice_id</label>
          <input id="voice" class="form-control" value="FzF9ACIefsb6wbrYVjf1">
        </div>
        <div class="col-md-4">
          <label class="form-label small text-mute2">model_id</label>
          <input id="model" class="form-control" value="eleven_v3">
        </div>
        <div class="col-md-3">
          <label class="form-label small text-mute2">stability</label>
          <input id="stability" class="form-control" type="number" min="0" max="1" step="0.05" value="0.5">
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button id="go" class="btn btn-primary">合成</button>
        <button id="clear" class="btn btn-outline-secondary">清空日志</button>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <strong class="small">运行日志</strong>
        <span id="stats" class="text-mute2 small"></span>
      </div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <strong class="small">音频结果</strong>
        <a id="dl" class="small text-mute2 d-none" href="#" download>下载 mp3</a>
      </div>
      <audio id="player" controls class="w-100"></audio>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
